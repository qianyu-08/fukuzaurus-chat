<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OpenAI Direct Chat (Local Only)</title>
  <style>
    :root{
      --bg:#0f1115;
      --panel:#171a21;
      --line:#2a2f3a;
      --text:#e7eaf0;
      --muted:#9aa3b2;
      --user:#2d6cdf;
      --bot:#232836;
      --accent:#7c8cff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      background:radial-gradient(circle at top,#171b28,var(--bg) 45%);
      color:var(--text);
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .app{
      width:min(900px,100%);
      height:min(90vh,900px);
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      background:rgba(23,26,33,.92);
      box-shadow:0 20px 60px rgba(0,0,0,.35);
      backdrop-filter:blur(10px);
    }
    .header{
      padding:16px 18px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }
    .title{font-weight:700}
    .status{color:var(--muted);font-size:14px}
    .messages{
      flex:1;
      overflow:auto;
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .msg{
      max-width:78%;
      padding:12px 14px;
      border:1px solid var(--line);
      border-radius:14px;
      white-space:pre-wrap;
      line-height:1.55;
      word-break:break-word;
    }
    .user{
      align-self:flex-end;
      background:linear-gradient(180deg,rgba(45,108,223,.96),rgba(29,82,185,.96));
      border-color:rgba(255,255,255,.08);
    }
    .bot{align-self:flex-start;background:var(--bot)}
    .composer{
      border-top:1px solid var(--line);
      padding:14px;
      display:flex;
      gap:10px;
      background:rgba(15,17,21,.55);
    }
    textarea{
      flex:1;
      resize:none;
      height:54px;
      max-height:180px;
      padding:14px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#11141b;
      color:var(--text);
      outline:none;
      font:inherit;
    }
    button{
      min-width:96px;
      border:0;
      border-radius:12px;
      padding:0 18px;
      background:var(--accent);
      color:white;
      font-weight:700;
      cursor:pointer;
    }
    button:disabled, textarea:disabled{
      opacity:.6;
      cursor:not-allowed;
    }
    .hint{
      padding:0 18px 14px;
      color:var(--muted);
      font-size:13px;
    }
    .danger{
      color:#ffb7b7;
      font-size:13px;
      padding:0 18px 14px;
    }
    code.inline{
      background:#0d1016;
      border:1px solid var(--line);
      padding:2px 6px;
      border-radius:8px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="title">OpenAI Direct Chat</div>
      <div class="status" id="status">待機中</div>
    </div>

    <div class="hint">
      Enter で送信、Shift + Enter で改行
    </div>
    <div class="danger">
      ローカル検証専用。APIキーがHTML内に見えるので、本番では絶対に使わないこと。
    </div>

    <div class="messages" id="messages">
      <div class="msg bot">こんにちは。直叩き版です。</div>
    </div>

    <form class="composer" id="form">
      <textarea id="input" placeholder="メッセージを入力..."></textarea>
      <button id="send" type="submit">送信</button>
    </form>
  </div>

  <script>
    // ここに直書きする。ローカル検証限定。
    const OPENAI_API_KEY = "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";

    const MODEL = "gpt-4.1";
    const API_URL = "https://api.openai.com/v1/responses";

    const messagesEl = document.getElementById("messages");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const statusEl = document.getElementById("status");

    const convo = [
      {
        role: "system",
        content: [
          {
            type: "input_text",
            text: "You are a helpful assistant."
          }
        ]
      }
    ];

    function addMessage(text, cls) {
      const div = document.createElement("div");
      div.className = `msg ${cls}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function setBusy(busy) {
      input.disabled = busy;
      sendBtn.disabled = busy;
      statusEl.textContent = busy ? "応答中..." : "待機中";
    }

    async function sendToOpenAI() {
      const payload = {
        model: MODEL,
        input: convo
      };

      const res = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${OPENAI_API_KEY}`
        },
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (!res.ok) {
        const msg = data?.error?.message || data?.error || `HTTP ${res.status}`;
        throw new Error(msg);
      }

      return data.output_text || "返答を取得できませんでした。";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      convo.push({
        role: "user",
        content: [
          {
            type: "input_text",
            text
          }
        ]
      });

      input.value = "";

      const placeholder = addMessage("入力中...", "bot");
      setBusy(true);

      try {
        const reply = await sendToOpenAI();
        placeholder.remove();
        addMessage(reply, "bot");

        convo.push({
          role: "assistant",
          content: [
            {
              type: "output_text",
              text: reply
            }
          ]
        });
      } catch (err) {
        placeholder.remove();
        addMessage(`エラー: ${err.message}`, "bot");
      } finally {
        setBusy(false);
        input.focus();
      }
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });
  </script>
</body>
</html>
