<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Direct OpenAI Chat</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --panel: #111827;
      --panel-2: #0f172a;
      --line: #223047;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #60a5fa;
      --user: #1d4ed8;
      --assistant: #1f2937;
      --danger: #ef4444;
      --ok: #10b981;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #111827 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 24px;
      margin: 0;
      letter-spacing: .2px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
    }

    .card {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.28);
      overflow: hidden;
    }

    .settings {
      display: grid;
      grid-template-columns: 1.3fr .7fr auto;
      gap: 10px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.85);
    }

    .settings input, .settings textarea, .composer textarea {
      width: 100%;
      border: 1px solid #314157;
      background: #0b1220;
      color: var(--text);
      border-radius: 12px;
      padding: 12px 14px;
      outline: none;
      font: inherit;
    }

    .settings textarea {
      resize: vertical;
      min-height: 46px;
      max-height: 120px;
    }

    .settings input:focus, .settings textarea:focus, .composer textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(96, 165, 250, .18);
    }

    .btn {
      border: 1px solid #314157;
      background: #0b1220;
      color: var(--text);
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font: inherit;
      transition: transform .06s ease, border-color .15s ease, opacity .15s ease;
      white-space: nowrap;
    }

    .btn:hover { border-color: var(--accent); }
    .btn:active { transform: translateY(1px); }
    .btn.primary {
      background: linear-gradient(180deg, #2563eb, #1d4ed8);
      border-color: #2563eb;
      font-weight: 700;
    }

    .status {
      padding: 10px 14px;
      font-size: 13px;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      background: rgba(11, 18, 32, 0.75);
    }

    .status b { color: var(--text); }

    .chat {
      height: min(68vh, 760px);
      overflow: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .msg {
      max-width: 85%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      white-space: pre-wrap;
      line-height: 1.55;
      word-wrap: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: rgba(29, 78, 216, 0.22);
      border-color: rgba(96, 165, 250, .35);
    }

    .msg.assistant {
      align-self: flex-start;
      background: rgba(31, 41, 55, 0.95);
    }

    .msg.system {
      align-self: center;
      max-width: 100%;
      background: rgba(15, 23, 42, 0.9);
      color: var(--muted);
      font-size: 13px;
      border-style: dashed;
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.85);
    }

    .composer textarea {
      min-height: 64px;
      resize: vertical;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
      padding: 0 14px 14px;
    }

    .danger { color: #fca5a5; }
    .ok { color: #6ee7b7; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>Direct OpenAI Chat</h1>
        <div class="hint">ブラウザ直叩き版。公開サイト向けではなく、ローカル確認用です。</div>
      </div>
    </div>

    <div class="card">
      <div class="settings">
        <input id="apiKey" type="password" placeholder="OpenAI APIキーを入力" autocomplete="off" />
        <input id="model" type="text" value="gpt-4.1-mini" placeholder="model" />
        <button class="btn" id="saveKeyBtn">キー保存</button>
        <textarea id="systemPrompt" placeholder="システム指示">あなたは簡潔で正確な日本語で返答するAIです。</textarea>
      </div>

      <div class="status" id="status">状態: <b>未接続</b></div>

      <div class="chat" id="chat"></div>

      <div class="composer">
        <textarea id="userInput" placeholder="メッセージを入力..."></textarea>
        <button class="btn primary" id="sendBtn">送信</button>
      </div>

      <div class="small">
        注意: APIキーをブラウザに置くと、そのページ上のJavaScriptから見えてしまいます。公開運用には向きません。
      </div>
    </div>
  </div>

  <script>
    const chatEl = document.getElementById('chat');
    const apiKeyEl = document.getElementById('apiKey');
    const modelEl = document.getElementById('model');
    const systemPromptEl = document.getElementById('systemPrompt');
    const userInputEl = document.getElementById('userInput');
    const statusEl = document.getElementById('status');
    const saveKeyBtn = document.getElementById('saveKeyBtn');
    const sendBtn = document.getElementById('sendBtn');

    let messages = [];
    const savedKey = sessionStorage.getItem('openai_api_key'); // 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
    if (savedKey) {
      apiKeyEl.value = savedKey;
      setStatus('キーを読み込みました', 'ok');
    }

    function setStatus(text, kind = '') {
      const badge = kind === 'ok' ? `<b class="ok">OK</b>` : kind === 'danger' ? `<b class="danger">ERROR</b>` : `<b>INFO</b>`;
      statusEl.innerHTML = `状態: ${badge} ${text}`;
    }

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
      return div;
    }

    function buildInput() {
      const input = [];

      const systemPrompt = systemPromptEl.value.trim();
      if (systemPrompt) {
        input.push({
          role: 'system',
          content: [{ type: 'input_text', text: systemPrompt }]
        });
      }

      for (const msg of messages) {
        if (msg.role === 'assistant') {
          input.push({
            role: 'assistant',
            content: [{ type: 'output_text', text: msg.text }]
          });
        } else {
          input.push({
            role: 'user',
            content: [{ type: 'input_text', text: msg.text }]
          });
        }
      }

      return input;
    }

    function extractText(data) {
      if (!data) return '';
      if (typeof data.output_text === 'string' && data.output_text.trim()) {
        return data.output_text.trim();
      }

      const parts = [];
      const output = Array.isArray(data.output) ? data.output : [];

      for (const item of output) {
        if (item?.type === 'output_text' && typeof item.text === 'string') {
          parts.push(item.text);
        }

        if (item?.content && Array.isArray(item.content)) {
          for (const c of item.content) {
            if ((c?.type === 'output_text' || c?.type === 'text') && typeof c.text === 'string') {
              parts.push(c.text);
            }
          }
        }
      }

      return parts.join('').trim();
    }

    async function callOpenAI() {
      const apiKey = apiKeyEl.value.trim();
      const model = modelEl.value.trim();

      if (!apiKey) {
        setStatus('APIキーが空です', 'danger');
        return;
      }

      const payload = {
        model,
        input: buildInput(),
        max_output_tokens: 800
      };

      setStatus('送信中...', '');
      sendBtn.disabled = true;

      try {
        const res = await fetch('https://api.openai.com/v1/responses', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          const msg = data?.error?.message || `HTTP ${res.status}`;
          throw new Error(msg);
        }

        const text = extractText(data) || '(empty response)';
        messages.push({ role: 'assistant', text });
        addMessage('assistant', text);
        setStatus('応答を受信しました', 'ok');
      } catch (err) {
        addMessage('system', `エラー: ${err.message}`);
        setStatus(err.message, 'danger');
      } finally {
        sendBtn.disabled = false;
      }
    }

    saveKeyBtn.addEventListener('click', () => {
      const key = apiKeyEl.value.trim();
      if (!key) {
        sessionStorage.removeItem('openai_api_key');
        setStatus('保存を解除しました', '');
        return;
      }
      sessionStorage.setItem('openai_api_key', key);
      setStatus('キーを保存しました（sessionStorage）', 'ok');
    });

    async function sendMessage() {
      const text = userInputEl.value.trim();
      if (!text) return;

      if (!messages.length) {
        addMessage('system', '新しい会話を開始しました');
      }

      messages.push({ role: 'user', text });
      addMessage('user', text);
      userInputEl.value = '';
      await callOpenAI();
    }

    sendBtn.addEventListener('click', sendMessage);

    userInputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    addMessage('system', 'APIキーを入れて、モデル名を確認してから送信してください。');
  </script>
</body>
</html>
